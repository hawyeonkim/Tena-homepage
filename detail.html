<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Page - NARRATIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="custom-cursor"></div>
    <header class="header">
        <div class="logo-wrapper">
            <h1 class="logo-text detail-title">PROJECT DETAILS</h1>
        </div>
        <p class="subtitle"><a href="index.html" style="color: black; text-decoration: none;">&larr; Back to Home</a></p>
    </header>

    <main class="portfolio-grid" style="grid-template-columns: 1fr; margin-top: 50px;">
        <article class="portfolio-card reveal" style="padding: 50px;">
            <h2 class="card-title" style="font-size: 3rem;">IN-DEPTH EDITORIAL</h2>
            <p class="card-desc" style="font-size: 1.2rem; color: #fff; margin-bottom: 30px;">
                This is a detailed showcase of the specific project you clicked on. We utilize high-end brutalist principles and deep research to construct meaningful brand narratives.
            </p>
            <div class="card-image-wrapper" style="max-height: 600px;">
                <img src="images/branding.png" alt="Detail Graphic" style="width: 100%; height: auto;">
            </div>
        </article>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const hoverElements = document.querySelectorAll('a, button, .portfolio-card');
        hoverElements.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('active'));
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
    });
    </script>
</body>
</html>
