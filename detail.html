<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Page - NARRATIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="logo-text detail-title">PROJECT DETAILS</h1>
        <p class="subtitle"><a href="index.html" style="color: black; text-decoration: none;">&larr; Back to Home</a></p>

    <main class="portfolio-grid" style="grid-template-columns: 1fr; margin-top: 50px;">
        <article class="portfolio-card" style="padding: 50px;">

            <p class="card-desc" style="font-size: 1.2rem; color: #fff; margin-bottom: 30px;">

            </p>
            <div class="card-image-wrapper" style="max-height: 600px;">
                <img src="images/branding.png" alt="Detail Graphic" style="width: 100%; height: auto;">
            </div>
        </article>
    </main>
