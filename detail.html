<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Page - NARRATIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="custom-cursor"></div>
    <header class="header">
        <div class="logo-wrapper">
            <h1 class="logo-text detail-title">PROJECT DETAILS</h1>
        </div>
        <p class="subtitle"><a href="index.html" style="color: black; text-decoration: none;">&larr; Back to Home</a></p>
    </header>

    <main style="margin-top: 40px;">
        <!-- Removed 'reveal' class for instant visibility -->
        <div class="detail-content-view">
            <div id="project-media" class="project-media-wrapper">
                <!-- Media will be injected here instantly by the script below -->
            </div>
        </div>
        
        <!-- Premium Back Navigation -->
        <div style="text-align: center; padding: 60px 0;">
            <a href="index.html" class="nav-btn group" style="text-decoration: none; display: inline-flex; border: 2px solid #000; padding: 20px 40px;">
                <span class="default">&larr; BACK TO HOME (SELECTION)</span>
                <span class="hover-text">&larr; 목록으로 돌아가기 (홈으로)</span>
            </a>
        </div>
    </main>

    <style>
        .detail-content-view {
            width: 100%;
            max-width: 860px; /* Adjusted per request */
            margin: 0 auto;
            background-color: #000;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            min-height: 800px; /* Pre-size to avoid jump */
        }
        .project-media-wrapper {
            width: 100%;
        }
        .project-media-wrapper img, .project-media-wrapper video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>

    <script>
    (function() {
        // Immediate execution to avoid DOMContentLoaded delay
        const urlParams = new URLSearchParams(window.location.search);
        let mediaSrc = urlParams.get('img');
        
        if (mediaSrc) {
            mediaSrc = mediaSrc.replace(/ /g, '%20');
            const container = document.getElementById('project-media');
            if (container) {
                if (mediaSrc.toLowerCase().endsWith('.mp4')) {
                    container.innerHTML = `<video src="${mediaSrc}" autoplay loop muted playsinline style="width: 100%; height: auto;"></video>`;
                } else {
                    // Pre-creating image object for faster rendering trigger
                    const img = new Image();
                    img.src = mediaSrc;
                    img.style.width = '100%';
                    img.style.height = 'auto';
                    img.alt = 'Project Design';
                    img.onerror = function() {
                        document.body.insertAdjacentHTML('beforeend', '<p style=color:red;text-align:center>Image not found: ' + mediaSrc + '</p>');
                    };
                    container.appendChild(img);
                }
            }
        }
    })();

    document.addEventListener('DOMContentLoaded', () => {
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const hoverElements = document.querySelectorAll('a, button, .portfolio-card');
        hoverElements.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('active'));
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
    });
    </script>
</body>
</html>
